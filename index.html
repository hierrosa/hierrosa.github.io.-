<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Räume für Jeden</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">

<style>
:root {
  --text: #111;
  --muted: #6b6b6b;
  --border: #ececec;
  --bg-soft: #f7f7f7;
  --status-progress: #3b82f6;
  --status-hold: #f59e0b;
  --status-done: #10b981;
  --status-stop: #ef4444;
  --kategorie-irritation: #e11d48;
  --kategorie-verstaerkung: #2563eb;
  --kategorie-zuspitzung: #7c3aed;
  --kategorie-support: #059669;
  --kategorie-physisch: #ea580c;
}

body { margin: 0; background: #fff; font-family: 'Inter', sans-serif; }

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

header {
  padding: 80px 24px 40px;
  max-width: 900px;
  position: relative;
  z-index: 2;
}

.bg-gradient {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 60vh;
  z-index: 0;
  background: linear-gradient(-45deg, #d6a9cd, #d0b4f0, #e8f9d8, #b2d5e6);
  background-size: 400% 400%;
  animation: gradientShift 40s ease infinite;
  mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
  -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
}

h1 {
  font-family: "Space Grotesk", sans-serif;
  font-size: 60px;
  font-weight: 600;
  letter-spacing: -0.5px;
  margin-bottom: 16px;
}

.filters {
  padding: 20px 24px;
  margin-top: 30px;
  border-top: 1px solid #111;
  position: relative;
  z-index: 2;
}

.filter-top { 
  display: flex; 
  gap: 0px; /* Gap handled by padding-left on group */
  align-items: flex-start; 
}

.filter-group {
    padding-bottom: 15px;
}

/* THE BLACK LINE */
.filter-group + .filter-group {
  border-left: 4px solid #111;
  padding-left: 40px;
  padding-right: 40px;
}

.filter-group strong {
  font-family: "Space Grotesk", sans-serif;
  display: block;
  margin-bottom: 8px;
  font-weight: 500;
  color: #000;
  text-transform: uppercase;
  font-size: 15px;
}

.filter-btn {
  border: none;
  background: none;
  padding: 6px 0;
  margin: 4px 14px 4px 0;
  cursor: pointer;
  color: #b5b5b5;
  font-size: 14px;
  text-transform: uppercase;
  transition: color 0.2s ease;
}

.filter-btn:hover { color: #111; }

.filter-btn.active {
  color: #111;
  font-weight: 600;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 60px;
  padding: 60px 44px;
  border-top: 1px solid #111;
}

.card {
  cursor: pointer;
  transition: 0.45s cubic-bezier(0.23, 1, 0.32, 1);
}

.card:hover { transform: translateY(-8px) scale(1.12); }

.card img {
  width: 100%;
  height: 360px;
  object-fit: cover;
  filter: grayscale(100%);
  transition: 0.6s ease;
}

.card:hover img { filter: grayscale(0%); }

.card-content { padding: 16px 0; }

.kategorie {
  font-size: 11px;
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 8px;
  display: block;
}

.kategorie[data-kategorie="Irritation"] { color: var(--kategorie-irritation); }
.kategorie[data-kategorie="Verstärkung"] { color: var(--kategorie-verstaerkung); }
.kategorie[data-kategorie="Zuspitzung"] { color: var(--kategorie-zuspitzung); }
.kategorie[data-kategorie="Support"] { color: var(--kategorie-support); }
.kategorie[data-kategorie="Physische Erfahrung"] { color: var(--kategorie-physisch); }

.status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
}

.status::before {
  content: "";
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.status[data-status="wird umgesetzt"]::before { background: var(--status-progress); }
.status[data-status="pausiert"]::before { background: var(--status-hold); }
.status[data-status="umgesetzt"]::before { background: var(--status-done); }
.status[data-status="nicht umsetzbar"]::before { background: var(--status-stop); }

/* OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.98);
  display: none;
  z-index: 1000;
  padding: 80px 24px;
  overflow-y: auto;
}

.overlay.active { display: block; }

.overlay-inner { max-width: 800px; margin: auto; position: relative; }

.close {
  position: fixed;
  top: 40px;
  right: 40px;
  font-size: 30px;
  cursor: pointer;
  z-index: 1001;
}

.detail-layout img {
  width: 100%;
  max-height: 500px;
  object-fit: cover;
  margin: 30px 0;
}

#detail-text { line-height: 1.6; font-size: 18px; color: #333; }

@media (max-width: 600px) {
  h1 { font-size: 32px; }
  .filter-top { flex-direction: column; }
  .filter-group + .filter-group { border-left: none; padding-left: 0; border-top: 1px solid #111; padding-top: 20px; }
}
</style>
</head>

<body>
<div class="bg-gradient"></div>
<header>
  <h1>Räume für Jeden – inklusiv, immersiv, interaktiv</h1>
  <p>Experimentelle Interventionen zur Gestaltung von Wahrnehmung und Raum.</p>
</header>

<div class="filters">
  <div class="filter-top">
    <div class="filter-group">
      <strong>01 / Kategorie</strong>
      <div class="filter-options">
        <button class="filter-btn" onclick="toggleFilter('kategorie','Irritation', this)">Irritation</button>
        <button class="filter-btn" onclick="toggleFilter('kategorie','Verstärkung', this)">Verstärkung</button>
        <button class="filter-btn" onclick="toggleFilter('kategorie','Zuspitzung', this)">Zuspitzung</button>
        <button class="filter-btn" onclick="toggleFilter('kategorie','Support', this)">Support</button>
        <button class="filter-btn" onclick="toggleFilter('kategorie','Physische Erfahrung', this)">Physische Erfahrung</button>
      </div>
    </div>

    <div class="filter-group">
      <strong>02 / Status</strong>
      <div class="filter-options">
        <button class="filter-btn" onclick="toggleFilter('status','wird umgesetzt', this)">wird umgesetzt</button>
        <button class="filter-btn" onclick="toggleFilter('status','pausiert', this)">pausiert</button>
        <button class="filter-btn" onclick="toggleFilter('status','umgesetzt', this)">umgesetzt</button>
        <button class="filter-btn" onclick="toggleFilter('status','nicht umsetzbar', this)">nicht umsetzbar</button>
      </div>
    </div>
  </div>
</div>

<section id="grid" class="grid"></section>

<div id="overlay" class="overlay">
  <div class="close" onclick="closeDetail()">✕</div>
  <div class="overlay-inner">
    <span id="detail-kategorie" class="kategorie"></span>
    <h2 id="detail-title" style="font-family:'Space Grotesk'; font-size: 40px; margin: 10px 0;"></h2>
    <span id="detail-status" class="status"></span>
    <div class="detail-layout">
      <img id="detail-img" src="" alt="">
      <p id="detail-text"></p>
    </div>
  </div>
</div>

<script>
const activeFilters = { kategorie: [], status: [] };

const data = Array.from({length: 12}, (_, i) => {
  const kats = ["Irritation","Verstärkung","Zuspitzung","Support","Physische Erfahrung"];
  const stats = ["wird umgesetzt","pausiert","umgesetzt","nicht umsetzbar"];
  return {
    title: "Intervention #" + (i+1),
    kategorie: kats[i % kats.length],
    status: stats[i % stats.length],
    text: "Dies ist eine detaillierte Beschreibung. Wir erforschen hier, wie räumliche Interventionen die Wahrnehmung verändern können.",
    img: `https://picsum.photos/seed/${i+123}/800/600`
  };
});

function toggleFilter(type, value, el) {
  const arr = activeFilters[type];
  const index = arr.indexOf(value);
  if (index > -1) {
    arr.splice(index, 1);
  } else {
    arr.push(value);
  }
  render();
}

function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const filtered = data.filter(item => 
    (activeFilters.kategorie.length === 0 || activeFilters.kategorie.includes(item.kategorie)) &&
    (activeFilters.status.length === 0 || activeFilters.status.includes(item.status))
  );

  filtered.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";
    card.onclick = () => openDetail(item);
    
    card.innerHTML = `
      <img src="${item.img}" alt="${item.title}">
      <div class="card-content">
        <span class="kategorie" data-kategorie="${item.kategorie}">${item.kategorie}</span>
        <h3 style="margin: 5px 0;">${item.title}</h3>
        <span class="status" data-status="${item.status}">${item.status}</span>
      </div>
    `;
    grid.appendChild(card);
  });

  // Sync Buttons
  document.querySelectorAll(".filter-btn").forEach(btn => {
    const val = btn.textContent.trim();
    const isActive = activeFilters.kategorie.includes(val) || activeFilters.status.includes(val);
    btn.classList.toggle("active", isActive);
  });
}

function openDetail(item) {
  document.getElementById("detail-title").innerText = item.title;
  document.getElementById("detail-text").innerText = item.text;
  document.getElementById("detail-img").src = item.img;
  
  const cat = document.getElementById("detail-kategorie");
  cat.innerText = item.kategorie;
  cat.setAttribute("data-kategorie", item.kategorie);

  const stat = document.getElementById("detail-status");
  stat.innerText = item.status;
  stat.setAttribute("data-status", item.status);

  document.getElementById("overlay").classList.add("active");
  document.body.style.overflow = "hidden";
}

function closeDetail() {
  document.getElementById("overlay").classList.remove("active");
  document.body.style.overflow = "auto";
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeDetail();
});

render();
</script>
</body>
</html>
